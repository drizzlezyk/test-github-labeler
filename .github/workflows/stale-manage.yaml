name: "Close stale resolved issues"
on:
  schedule:
    - cron: '*/20 * * * *' 

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write # only for delete-branch option
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.ZYK_PERSONAL_TOKEN }}

          # 只处理带有 resolved 标签的 issue
          only-labels: 'resolved'

          # 3 天后标记为 stale
          days-before-stale: 0.03
          stale-issue-label: 'stale'
          stale-issue-message: |
            This issue has been marked as "resolved" and has not seen any recent activity. 
            As a result, it is now being labeled as "stale". 
            If you believe this is in error, please update the issue to remove the "stale" label. 
            Stale issues will be automatically closed if no further activity occurs.

          # 4 天后关闭 stale 的 issue
          days-before-close: 0.03
          close-issue-message: |
            This issue is being closed due to a lack of recent activity. 
            If you have any further questions or requirements, please feel free to reopen this issue or create a new one.

          # 当 issue 有更新时，自动移除 stale 标签（默认 true）
          remove-stale-when-updated: true
          # 同时移除 resolved 标签
          labels-to-remove-when-unstale: 'resolved'

          # 避免误操作 PR（如果需要也可以处理 PR，这里只针对 issue）
          days-before-pr-stale: -1
          days-before-pr-close: -1